version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://picgen:picgen_password@postgres:5432/picgen
      - REDIS_URL=redis://redis:6379
    networks:
      - picgen-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: picgen
      POSTGRES_PASSWORD: picgen_password
      POSTGRES_DB: picgen
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picgen -d picgen"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - picgen-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - picgen-network

volumes:
  postgres-data:
  redis-data:

networks:
  picgen-network:
    driver: bridge
